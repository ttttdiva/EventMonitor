[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Tests that take more than a few seconds
    external: Tests that require external services (Twitter, Discord, etc.)
    database: Tests that require database
asyncio_mode = auto